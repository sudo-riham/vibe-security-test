steps:
  # -----------------------------------------------
  # STEP 1: Secret Detection (Gitleaks)
  # Scans every file for hardcoded API keys,
  # passwords, tokens, and credentials
  # -----------------------------------------------
  - name: 'zricethezav/gitleaks'
    entrypoint: 'gitleaks'
    args:
      - 'detect'
      - '--source=.'
      - '--verbose'
      - '--no-git'
    id: 'secret-detection'

options:
  logging: CLOUD_LOGGING_ONLY
