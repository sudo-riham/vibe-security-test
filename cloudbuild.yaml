steps:
  # -----------------------------------------------
  # STEP 1: Secret Detection (Gitleaks)
  # -----------------------------------------------
  - name: 'zricethezav/gitleaks'
    entrypoint: 'gitleaks'
    args:
      - 'detect'
      - '--source=.'
      - '--verbose'
      - '--no-git'
    id: 'secret-detection'

  # -----------------------------------------------
  # STEP 2: SAST Scanning (Semgrep)
  # -----------------------------------------------
  - name: 'returntocorp/semgrep'
    entrypoint: 'semgrep'
    args:
      - 'scan'
      - '--config=auto'
      - '--severity=WARNING'
      - '--severity=ERROR'
      - '--error'
      - '--json-output=/workspace/semgrep-results.json'
      - '.'
    id: 'sast-scan'

  # -----------------------------------------------
  # STEP 3: Print SAST results to logs
  # -----------------------------------------------
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "==============================="
        echo "      SAST Scan Results"
        echo "==============================="
        if [ -f /workspace/semgrep-results.json ]; then
          cat /workspace/semgrep-results.json
        else
          echo "No results file found"
        fi
    id: 'print-results'

  # -----------------------------------------------
  # STEP 3: CVE Scanning (pip-audit)
  # -----------------------------------------------
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install pip-audit --quiet
        if [ -f requirements.txt ]; then
          echo "Scanning requirements.txt for known CVEs..."
          pip-audit -r requirements.txt
          EXIT_CODE=$$?
          if [ $$EXIT_CODE -ne 0 ]; then
            echo "FAILED: Known CVEs detected. Fix your dependencies before deploying."
            exit 1
          else
            echo "PASSED: No known CVEs found in dependencies."
          fi
        else
          echo "No requirements.txt found - skipping CVE scan."
        fi
    id: 'cve-gate'
  # -----------------------------------------------
  # STEP 4: Build the container image
  # -----------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        IMAGE="us-central1-docker.pkg.dev/$PROJECT_ID/security-gateway/$REPO_NAME:$SHORT_SHA"
        echo "Building image: $$IMAGE"
        echo $$IMAGE > /workspace/image-name.txt
        docker build -t $$IMAGE .
    id: 'build-image'

  # -----------------------------------------------
  # STEP 5: Push image to Artifact Registry
  # -----------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        IMAGE=$$(cat /workspace/image-name.txt)
        echo "Pushing image: $$IMAGE"
        docker push $$IMAGE
    id: 'push-image'

  # -----------------------------------------------
  # STEP 6: Sign the image (Binary Authorization)
  # Only reached if ALL previous steps passed
  # -----------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        IMAGE=$$(cat /workspace/image-name.txt)
        echo "All security checks passed."
        echo "Signing image: $$IMAGE"

        IMAGE_DIGEST=$$(gcloud artifacts docker images describe \
          $$IMAGE \
          --format='get(image_summary.digest)')

        echo "Image digest: $$IMAGE_DIGEST"

        gcloud container binauthz attestations sign-and-create \
          --artifact-url="us-central1-docker.pkg.dev/$PROJECT_ID/security-gateway/$REPO_NAME@$$IMAGE_DIGEST" \
          --attestor=security-gateway-attestor \
          --attestor-project=$PROJECT_ID \
          --keyversion-project=$PROJECT_ID \
          --keyversion-location=us-central1 \
          --keyversion-keyring=security-gateway-keyring \
          --keyversion-key=security-gateway-signer \
          --keyversion=1

        echo "Image signed successfully."
        echo "This image is now authorized for production deployment."
    id: 'sign-image'

  # -----------------------------------------------
  # STEP 7: Deploy temporary preview to Cloud Run
  # ZAP needs a live URL to scan
  # -----------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        IMAGE=$$(cat /workspace/image-name.txt)
        echo "Deploying temporary preview environment..."

        gcloud run deploy preview-$SHORT_SHA \
          --image=$$IMAGE \
          --platform=managed \
          --region=us-central1 \
          --allow-unauthenticated \
          --port=8080 \
          --max-instances=1 \
          --quiet

        # Get the deployed URL and save it for ZAP
        PREVIEW_URL=$$(gcloud run services describe preview-$SHORT_SHA \
          --platform=managed \
          --region=us-central1 \
          --format='value(status.url)')

        echo "Preview deployed at: $$PREVIEW_URL"
        echo $$PREVIEW_URL > /workspace/preview-url.txt
    id: 'deploy-preview'

  # -----------------------------------------------
  # STEP 8: DAST Scanning (OWASP ZAP)
  # -----------------------------------------------
  - name: 'ghcr.io/zaproxy/zaproxy:stable'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        PREVIEW_URL=$$(cat /workspace/preview-url.txt)
        echo "==============================="
        echo "   DAST Scan Starting"
        echo "   Target: $$PREVIEW_URL"
        echo "==============================="

        zap-baseline.py \
          -t $$PREVIEW_URL \
          -J /workspace/zap-results.json \
          -r /workspace/zap-report.html \
          -I \
          --auto || true

        echo "ZAP scan complete."
        echo "Checking for high severity findings..."

        HIGH_COUNT=$$(python3 /workspace/check_zap.py)
        echo "High/Critical findings: $$HIGH_COUNT"

        if [ "$$HIGH_COUNT" -gt "0" ]; then
          echo "FAILED: $$HIGH_COUNT high severity finding(s) detected."
          exit 1
        else
          echo "PASSED: No high severity findings."
        fi
    id: 'dast-scan'

  # -----------------------------------------------
  # STEP 9: Delete the temporary preview environment
  # Always runs — even if ZAP fails
  # -----------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Deleting temporary preview environment..."
        gcloud run services delete preview-$SHORT_SHA \
          --platform=managed \
          --region=us-central1 \
          --quiet || true
        echo "Preview environment deleted."
    id: 'cleanup-preview'
options:
  logging: CLOUD_LOGGING_ONLY











